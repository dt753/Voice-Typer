appId: com.crystalvoice.app
productName: Crystal Voice
copyright: Copyright © 2024

directories:
  output: release

files:
  - dist/**/*
  - node_modules/**/*
  - package.json
  - assets/**/*

icon: assets/icon.png

# ── Windows ─────────────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch: [x64]
    - target: zip
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Crystal Voice
  include: build/installer.nsh

# ── macOS ────────────────────────────────────────────────────────────────────
mac:
  category: public.app-category.utilities
  extendInfo:
    NSMicrophoneUsageDescription: "Crystal Voice needs microphone access for voice-to-text transcription."
  target:
    - target: dmg
      arch: [x64]
    - target: zip
      arch: [x64, arm64]

dmg:
  title: Crystal Voice

# ── Общее ────────────────────────────────────────────────────────────────────
extraMetadata:
  main: dist/main.js
